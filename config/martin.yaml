# martin tile server configuration
# docs: https://maplibre.org/martin/config-file.html
#
# martin serves MVT tiles from PostGIS tables and MVT-encoded PMTiles files.
# MLT-encoded PMTiles (from freestiler) are NOT supported by Martin — they are
# served directly via the pmtiles JS protocol in map.html using the nginx
# static file path /data/pmtiles/*.

listen_addresses: "0.0.0.0:3000"

postgres:
  connection_string: postgresql://${POSTGRES_USER:-parcels}:${POSTGRES_PASSWORD:-parcels}@postgis:5432/${POSTGRES_DB:-parcels}

  tables:
    parcels:
      schema: parcels
      table: parcel
      geometry_column: geom
      srid: 4326
      geometry_type: MULTIPOLYGON
      bounds: [-180, -90, 180, 90]
      properties:
        id: bigint
        parcel_id: text
        geoid: text
        parcel_address: text
        parcel_city: text
        parcel_state: text
        owner_name: text
        total_value: bigint
        year_built: smallint
        use_description: text
        sale_amount: bigint
        assessed_acres: numeric

    parcel-centroids:
      schema: parcels
      table: parcel
      geometry_column: centroid
      srid: 4326
      geometry_type: POINT
      properties:
        id: bigint
        parcel_id: text
        geoid: text
        total_value: bigint

# only MVT-encoded pmtiles are supported by martin
pmtiles:
  paths:
    - /pmtiles
  sources:
    atlanta: /pmtiles/atlanta_downtown.pmtiles

styles:
  paths:
    - /config/styles

fonts:
  - /config/fonts

sprites:
  paths:
    - /config/sprites
