server {
    listen 80;
    server_name _;

    # static files
    root /usr/share/nginx/html;
    index index.html;

    # serve node_modules for local imports (maplibre-gl, terradraw, etc.)
    location /node_modules/ {
        alias /usr/share/nginx/html/node_modules/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # proxy: martin tile server
    location /tiles/ {
        proxy_pass http://martin:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # proxy: pg_featureserv OGC API
    location /features/ {
        proxy_pass http://pg-featureserv:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # proxy: pg_tileserv
    location /tileserv/ {
        proxy_pass http://pg-tileserv:7800/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # proxy: ingest API
    location /api/ {
        proxy_pass http://ingest-api:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # proxy: minio S3 API (for direct parquet access)
    location /s3/ {
        proxy_pass http://minio:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
